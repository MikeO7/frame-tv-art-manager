repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
    -   id: check-added-large-files

-   repo: https://github.com/golangci/golangci-lint
    rev: v1.64.5
    hooks:
    -   id: golangci-lint

-   repo: local
    hooks:
    -   id: go-mod-tidy
        name: go mod tidy
        entry: go mod tidy
        language: system
        files: \.go$
        pass_filenames: false

    -   id: go-test
        name: go test
        entry: go test ./...
        language: system
        files: \.go$
        pass_filenames: false
