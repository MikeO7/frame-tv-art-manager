name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Run tests
      run: go test ./...

    - name: Build release binaries
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        COMMIT=${{ github.sha }}
        DATE=$(date -u +%Y-%m-%d)
        LDFLAGS="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.BuildDate=${DATE}"

        # Linux AMD64
        GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o frame-tv-art-manager-linux-amd64 ./cmd/frame-tv-art-manager
        # Linux ARM64
        GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o frame-tv-art-manager-linux-arm64 ./cmd/frame-tv-art-manager
        # macOS AMD64
        GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o frame-tv-art-manager-darwin-amd64 ./cmd/frame-tv-art-manager
        # macOS ARM64 (Apple Silicon)
        GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o frame-tv-art-manager-darwin-arm64 ./cmd/frame-tv-art-manager
        # Linux ARMv7 (32-bit)
        GOOS=linux GOARCH=arm GOARM=7 go build -ldflags="${LDFLAGS}" -o frame-tv-art-manager-linux-armv7 ./cmd/frame-tv-art-manager

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          frame-tv-art-manager-linux-amd64
          frame-tv-art-manager-linux-arm64
          frame-tv-art-manager-darwin-amd64
          frame-tv-art-manager-darwin-arm64
          frame-tv-art-manager-linux-armv7
