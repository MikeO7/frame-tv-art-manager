name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Check out code
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.2'

    - name: Run tests
      run: go test ./...

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
      with:
        platforms: linux/amd64,linux/arm64

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          VERSION=${{ steps.meta.outputs.version }}
          GIT_COMMIT=${{ github.sha }}
          BUILD_DATE=$(date -u +%Y-%m-%d)
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build release binaries
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        COMMIT=${{ github.sha }}
        DATE=$(date -u +%Y-%m-%d)
        LDFLAGS="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.BuildDate=${DATE}"

        # Linux AMD64
        GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o frame-tv-art-manager-linux-amd64 ./cmd/frame-tv-art-manager
        # Linux ARM64
        GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o frame-tv-art-manager-linux-arm64 ./cmd/frame-tv-art-manager
        # macOS AMD64
        GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o frame-tv-art-manager-darwin-amd64 ./cmd/frame-tv-art-manager
        # macOS ARM64 (Apple Silicon)
        GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o frame-tv-art-manager-darwin-arm64 ./cmd/frame-tv-art-manager

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        generate_release_notes: true
        files: |
          frame-tv-art-manager-linux-amd64
          frame-tv-art-manager-linux-arm64
          frame-tv-art-manager-darwin-amd64
          frame-tv-art-manager-darwin-arm64
