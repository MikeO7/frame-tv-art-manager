name: Docker Build and Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Multi-Arch Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    # QEMU is still needed to provide the target-architecture environment 
    # for the final image assembly, but the heavy Go build is now native.
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern=latest
          type=raw,value=latest,enable={{is_default_branch}}
          type=ref,event=branch
          type=sha,format=short,enable=${{ github.event_name != 'pull_request' }}
        labels: |
          org.opencontainers.image.title=Frame TV Art Manager
          org.opencontainers.image.description=Automatic artwork sync for Samsung Frame TVs
          org.opencontainers.image.vendor=MikeO7

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        # Build for all 3 architectures in one pass. 
        # Because the Dockerfile uses cross-compilation, this is now lightning fast!
        platforms: linux/amd64,linux/arm64,linux/arm/v7
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          VERSION=${{ steps.meta.outputs.version }}
          GIT_COMMIT=${{ github.sha }}
          BUILD_DATE=$(date -u +%Y-%m-%d)
        # Using the GHA cache makes subsequent builds even faster
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false
        sbom: false

    - name: Output image information
      run: |
        {
          echo "## 🖼️ Docker Image Built Successfully!"
          echo ""
          echo "**Architectures**: linux/amd64, linux/arm64, linux/arm/v7"
          echo ""
          echo "**Tags**:"
          echo '```'
          echo "${{ steps.meta.outputs.tags }}"
          echo '```'
          echo ""
          echo "**Pull command**:"
          echo '```bash'
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"
