name: Docker Build and Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Multi-Arch Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
      with:
        platforms: linux/amd64,linux/arm64,linux/arm/v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels)
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          # Tag with version for releases (e.g., v1.0.0 -> 1.0.0)
          type=semver,pattern={{version}}
          # Tag with major.minor (e.g., v1.0.0 -> 1.0)
          type=semver,pattern={{major}}.{{minor}}
          # Tag with major version (e.g., v1.0.0 -> 1)
          type=semver,pattern={{major}}
          # Tag latest for any release
          type=semver,pattern=latest
          # Tag latest for main branch pushes
          type=raw,value=latest,enable={{is_default_branch}}
          # Tag with branch name
          type=ref,event=branch
          # Tag with short SHA for every commit
          type=sha,format=short,enable=${{ github.event_name != 'pull_request' }}
          # Tag PR number for pull requests
          type=ref,event=pr
        labels: |
          org.opencontainers.image.title=Frame TV Art Manager
          org.opencontainers.image.description=Automatic artwork sync for Samsung Frame TVs
          org.opencontainers.image.vendor=MikeO7

    - name: Set build metadata
      id: meta-args
      run: |
        echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
        echo "commit=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64,linux/arm64,linux/arm/v7
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          VERSION=${{ steps.meta.outputs.version }}
          GIT_COMMIT=${{ steps.meta-args.outputs.commit }}
          BUILD_DATE=${{ steps.meta-args.outputs.date }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false
        sbom: false

    - name: Output image information
      run: |
        {
          echo "## 🖼️ Docker Image Built Successfully!"
          echo ""
          echo "**Architectures**: linux/amd64, linux/arm64, linux/arm/v7"
          echo ""
          echo "**Tags**:"
          echo '```'
          echo "${{ steps.meta.outputs.tags }}"
          echo '```'
          echo ""
          echo "**Pull command**:"
          echo '```bash'
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"
