version: "2"

linters:
  enable:
    - gosec
    - revive
    - misspell
    - unconvert
    - goconst
    - gocyclo
    - asciicheck
    - bodyclose
    - dogsled
    - dupl
    - gocritic
    - goprintffuncname
    - nakedret
    - prealloc
    - unparam
  settings:
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: exported
          disabled: true
    goconst:
      min-len: 3
      min-occurrences: 3

run:
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - goconst
